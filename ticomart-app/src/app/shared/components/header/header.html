<mat-toolbar color="primary">
    <button mat-icon-button class="menu-icon" aria-label="Menu">
        <mat-icon>menu</mat-icon>
    </button>

    <span class="logo" routerLink="/">TicoMart</span>

    <span class="spacer"></span>

    <nav class="nav-links">
        <button mat-button routerLink="/products">Products</button>
    </nav>

    <button mat-icon-button routerLink="/cart" aria-label="Cart">
        <mat-icon [matBadge]="cartService.cartCount()" [matBadgeHidden]="cartService.cartCount() === 0"
            matBadgeColor="warn">
            shopping_cart
        </mat-icon>
    </button>

    <ng-container *ngIf="authService.isLoggedIn(); else loginBtn">
        <button mat-button [matMenuTriggerFor]="userMenu">
            <mat-icon>account_circle</mat-icon>
            <span class="username">{{ user?.firstName }}</span>
        </button>
        <mat-menu #userMenu="matMenu">
            <button mat-menu-item>Profile</button>
            <button mat-menu-item (click)="logout()">Logout</button>
        </mat-menu>
    </ng-container>

    <ng-template #loginBtn>
        <button mat-button routerLink="/auth/login">Login</button>
    </ng-template>
</mat-toolbar>
