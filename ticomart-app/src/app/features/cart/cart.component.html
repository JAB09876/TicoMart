<div class="cart-container">
    <h1>Your Shopping Cart</h1>

    <div *ngIf="cartItems().length > 0; else emptyCart" class="cart-content">
        <mat-card class="cart-table-card">
            <table mat-table [dataSource]="cartItems()" class="cart-table">

                <!-- Product Column -->
                <ng-container matColumnDef="product">
                    <th mat-header-cell *matHeaderCellDef> Product </th>
                    <td mat-cell *matCellDef="let item">
                        <div class="product-cell">
                            <img [src]="item.product.thumbnail" [alt]="item.product.title">
                            <span>{{item.product.title}}</span>
                        </div>
                    </td>
                </ng-container>

                <!-- Price Column -->
                <ng-container matColumnDef="price">
                    <th mat-header-cell *matHeaderCellDef> Price </th>
                    <td mat-cell *matCellDef="let item"> ${{item.product.price}} </td>
                </ng-container>

                <!-- Quantity Column -->
                <ng-container matColumnDef="quantity">
                    <th mat-header-cell *matHeaderCellDef> Quantity </th>
                    <td mat-cell *matCellDef="let item">
                        <div class="qty-controls">
                            <button mat-icon-button (click)="updateQuantity(item.product.id, item.quantity - 1)"
                                [disabled]="item.quantity <= 1">
                                <mat-icon>remove</mat-icon>
                            </button>
                            <span>{{item.quantity}}</span>
                            <button mat-icon-button (click)="updateQuantity(item.product.id, item.quantity + 1)">
                                <mat-icon>add</mat-icon>
                            </button>
                        </div>
                    </td>
                </ng-container>

                <!-- Total Column -->
                <ng-container matColumnDef="total">
                    <th mat-header-cell *matHeaderCellDef> Total </th>
                    <td mat-cell *matCellDef="let item">
                        ${{item.product.price * item.quantity}}
                    </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef> </th>
                    <td mat-cell *matCellDef="let item">
                        <button mat-icon-button color="warn" (click)="removeItem(item.product.id)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="letrow; columns: displayedColumns;"></tr>
            </table>
        </mat-card>

        <div class="cart-summary">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>Order Summary</mat-card-title>
                </mat-card-header>
                <mat-card-content>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>${{cartTotal()}}</span>
                    </div>
                </mat-card-content>
                <mat-card-actions>
                    <button mat-raised-button color="primary" class="full-width" (click)="checkout()">
                        Proceed to Checkout
                    </button>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>

    <ng-template #emptyCart>
        <div class="empty-cart-state">
            <mat-icon class="large-icon">shopping_cart</mat-icon>
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added any items to your cart yet.</p>
            <button mat-raised-button color="primary" routerLink="/products">
                Start Shopping
            </button>
        </div>
    </ng-template>
</div>
