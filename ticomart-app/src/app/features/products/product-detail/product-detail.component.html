<div class="product-detail-container" *ngIf="product; else loading">
    <button mat-button (click)="goBack()" class="back-button">
        <mat-icon>arrow_back</mat-icon> Back
    </button>

    <div class="detail-grid">
        <div class="image-gallery">
            <div class="main-image">
                <img [src]="product.images[0]" [alt]="product.title">
            </div>
            <div class="thumbnails" *ngIf="product.images.length > 1">
                <img *ngFor="let img of product.images" [src]="img" [alt]="product.title">
            </div>
        </div>

        <div class="product-info-section">
            <div class="badges">
                <span class="category-badge">{{product.category}}</span>
                <span class="brand-badge" *ngIf="product.brand">{{product.brand}}</span>
            </div>

            <h1 class="title">{{product.title}}</h1>

            <div class="rating-row">
                <mat-icon class="star">star</mat-icon>
                <span class="rating-value">{{product.rating}}</span>
                <span class="stock-status" [class.in-stock]="product.stock > 0">
                    {{ product.stock > 0 ? 'In Stock' : 'Out of Stock' }}
                </span>
            </div>

            <div class="price-section">
                <span class="price">${{product.price}}</span>
                <span class="discount" *ngIf="product.discountPercentage > 0">
                    -{{product.discountPercentage}}%
                </span>
            </div>

            <p class="description">{{product.description}}</p>

            <div class="actions">
                <div class="quantity-controls">
                    <button mat-icon-button (click)="decreaseQuantity()" [disabled]="quantity <= 1">
                        <mat-icon>remove</mat-icon>
                    </button>
                    <span class="qty-display">{{quantity}}</span>
                    <button mat-icon-button (click)="increaseQuantity()">
                        <mat-icon>add</mat-icon>
                    </button>
                </div>

                <button mat-raised-button color="primary" class="add-btn" (click)="addToCart()">
                    Add to Cart
                </button>
            </div>
        </div>
    </div>
</div>

<ng-template #loading>
    <div class="loading-spinner">
        <mat-spinner></mat-spinner>
    </div>
</ng-template>
